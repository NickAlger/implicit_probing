# Build the Sphinx documentation site and deploy it to GitHub Pages.
#
# The API reference is generated by autosummary, which IMPORTS every documented module to introspect
# it -- including the FEniCS and JAX hooks. dolfinx is not pip-installable, so (exactly like the CI
# `fenics` job) the build runs inside the official dolfinx image, with jax + the Sphinx toolchain
# added via the [jax,docs] extras. Build and deploy are split (as in publish.yml): the deploy job runs
# on a plain runner and carries the Pages permissions.
#
# ONE-TIME SETUP (repo Settings -> Pages -> "Build and deployment"): set Source = "GitHub Actions".
# Note: Pages for a PRIVATE repo requires a paid plan; on the free plan the site publishes once the
# repo is public (the plan at release). Until then the build job succeeds but deploy won't serve.
name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Allow one concurrent Pages deployment; let an in-progress deploy finish rather than cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs (dolfinx image)
    runs-on: ubuntu-latest
    container: dolfinx/dolfinx:stable
    steps:
      - uses: actions/checkout@v4
      - run: pip install ".[jax,docs]"
      - run: python -m sphinx -b html -W --keep-going docs docs/_build/html
      - run: touch docs/_build/html/.nojekyll        # serve _static/_sources as-is
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write            # deploy to GitHub Pages
      id-token: write         # verify the deployment originates from this workflow
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
